# dataloader
batch_size: 32
eval_batch_size: 2048
num_workers: 0
drop_last: false

# optimizer
lr: 1.3e-4
weight_decay: 3.0e-2
betas: [0.9, 0.999]
grad_clip: 1.0

# schedule
max_epochs: 420
warmup_epochs: 12
min_lr: 1.0e-6

# early stopping
early_stop: true
early_stop_patience: 90
min_epochs: 160
select_metric: kappa
val_smooth_k: 15

# steps
steps_per_epoch: 0
grad_accum_steps: 1

# train-only augmentation (mild; avoid hurting small train set)
augment: true
noise_std: 0.002
spec_dropout_p: 0.06
spec_dropout_ratio: 0.04

# loss regularization (CE head)
label_smoothing: 0.02
conf_penalty: 0.0
focal_gamma: 0.0

# mixup (off for HanChuan; tends to reduce OA with 30/class)
mixup_alpha: 0.0
mixup_prob: 0.0

# evidential (kept for compatibility; unused when head=ce)
evi_coeff: 0.0
evi_anneal_epochs: 0
