# dataloader
batch_size: 64
eval_batch_size: 2048
num_workers: 0
drop_last: false

# optimizer
lr: 2.2e-4
weight_decay: 3.0e-2
betas: [0.9, 0.999]
grad_clip: 1.0

# schedule
max_epochs: 480
warmup_epochs: 16
min_lr: 1.0e-6

# early stopping (val is tiny -> use smoothing + patience)
early_stop: true
early_stop_patience: 120
min_epochs: 180
select_metric: kappa
val_smooth_k: 31

# steps (stabilize updates via larger effective batch)
steps_per_epoch: 48
grad_accum_steps: 2

# sampler (helps reduce seed variance when classes are imbalanced)
balanced_sampler: true
balanced_power: 0.5

# train-only augmentation
augment: true
noise_std: 0.008
spec_dropout_p: 0.15
spec_dropout_ratio: 0.08

# loss regularization (CE head)
label_smoothing: 0.05
conf_penalty: 0.02
mixup_alpha: 0.40
mixup_prob: 0.35
focal_gamma: 0.0
