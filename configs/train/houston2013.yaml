batch_size: 16
eval_batch_size: 2048
num_workers: 0
drop_last: false

lr: 0.00018
weight_decay: 0.010
betas: [0.9, 0.999]
grad_clip: 1.0

max_epochs: 420
warmup_epochs: 10
min_lr: 1.0e-06

early_stop: true
early_stop_patience: 120
min_epochs: 180
select_metric: kappa
val_smooth_k: 15

steps_per_epoch: 0
grad_accum_steps: 2

balanced_sampler: false
balanced_power: 0.5

augment: true
noise_std: 0.005
spec_dropout_p: 0.10
spec_dropout_ratio: 0.06

label_smoothing: 0.02
conf_penalty: 0.010
focal_gamma: 0.0

mixup_alpha: 0.2
mixup_prob: 0.15


backbone_lr_mult: 0.7
head_lr_mult: 1.0

ckpt_avg: true
ckpt_avg_k: 8
ckpt_avg_interval: 2
ckpt_avg_start_epoch: 40
ckpt_avg_end_epoch: 0
