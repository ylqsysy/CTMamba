batch_size: 16
eval_batch_size: 2048
num_workers: 0
drop_last: false

lr: 0.00020
weight_decay: 0.012
betas: [0.9, 0.999]
grad_clip: 1.0

max_epochs: 480
warmup_epochs: 12
min_lr: 1.0e-06

early_stop: true
early_stop_patience: 140
min_epochs: 200
select_metric: kappa
val_smooth_k: 15

steps_per_epoch: 0
grad_accum_steps: 2

balanced_sampler: true
balanced_power: 0.7

augment: true
noise_std: 0.008
spec_dropout_p: 0.12
spec_dropout_ratio: 0.08

label_smoothing: 0.03
conf_penalty: 0.015
focal_gamma: 1.0

mixup_alpha: 0.4
mixup_prob: 0.20


backbone_lr_mult: 0.6
head_lr_mult: 1.2

ckpt_avg: true
ckpt_avg_k: 10
ckpt_avg_interval: 2
ckpt_avg_start_epoch: 60
ckpt_avg_end_epoch: 0
