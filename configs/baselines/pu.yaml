baseline:
  svm:
    kernel: linear
    C: 0.8
    gamma: scale
    pca: 5
    max_train_per_class: 30
    class_weight: null
    
  cnn2d:
    patch_size: 15
    pca_bands: 7
    base_channels: 12
    dropout: 0.86
    augment: false
    batch_size: 64
    eval_batch_size: 512
    num_workers: 0

    lr: 0.00055
    weight_decay: 0.075
    grad_clip: 1.0

    max_epochs: 180
    early_stop_patience: 16
    min_epochs: 60
    select_metric: kappa

    use_amp: true
    label_smoothing: 0.18
    spectral_dropout: 0.38
    input_noise_std: 0.021

    class_weight: balanced
    class_weight_power: 0.55

  cnn3d:
    patch_size: 15
    pca_bands: 5
    dropout: 0.67
    augment: false
    batch_size: 32
    eval_batch_size: 256
    num_workers: 0
    lr: 0.00082
    weight_decay: 0.028
    grad_clip: 1.0
    max_epochs: 95
    early_stop_patience: 14
    min_epochs: 14
    select_metric: kappa
    use_amp: true
    label_smoothing: 0.09
    spectral_dropout: 0.52
    input_noise_std: 0.042

  spectralformer:
    patch_size: 15
    near_band: 11
    mode: CAF

    dim: 128
    depth: 6
    heads: 8
    dim_head: 16
    mlp_dim: 256
    dropout: 0.22
    emb_dropout: 0.14

    batch_size: 16
    eval_batch_size: 256
    num_workers: 4

    lr: 1.0e-4
    weight_decay: 6.0e-3
    betas: [0.9, 0.999]
    label_smoothing: 0.06
    grad_clip: 1.0

    max_epochs: 280
    early_stop: true
    early_stop_patience: 45
    min_epochs: 90
    select_metric: kappa

    scheduler: cosine
    min_lr: 1.0e-6

    pad_mode: reflect
    norm_mean_global_blend: 0.0
    norm_std_global_ratio: 0.05
    norm_std_abs_floor: 1.0e-3

    use_amp: true

  ssftt:
    patch_size: 15
    spectral_method: pca
    pca_bands: 30

    batch_size: 16
    eval_batch_size: 256
    num_workers: 0

    lr: 0.00016
    weight_decay: 0.12
    max_epochs: 150
    min_epochs: 30
    early_stop_patience: 18
    select_metric: kappa

    num_tokens: 1
    dim: 24
    depth: 1
    heads: 2
    mlp_dim: 48
    dropout: 0.74
    emb_dropout: 0.66

  3dss_mamba:
    patch_size: 15
    spectral_method: pca
    pca_bands: 24
    pca_whiten: false

    embed_dim: 40
    depth: 2
    d_state: 20
    dt_rank: 4
    dim_inner: 80
    group_type: "Cube"
    scan_type: "Parallel spectral-spatial"
    k_group: 4
    pos: true
    cls: true
    conv3D_channel: 40
    conv3D_kernel: [3, 5, 5]

    augment: true
    batch_size: 16
    lr: 1.6e-4
    weight_decay: 6.0e-3
    betas: [0.9, 0.999]
    grad_clip: 1.0
    label_smoothing: 0.06

    max_epochs: 170
    min_epochs: 50
    early_stop_patience: 18
    select_metric: kappa
    min_lr: 1.0e-6
    log_every: 10

    num_workers: 8
    prefetch_factor: 2
    persistent_workers: true
    eval_num_workers: 2
    test_num_workers: 4
    persistent_eval_workers: false
    val_prefetch_factor: 2
    test_prefetch_factor: 2

    speed_cudnn_benchmark: true
    speed_tf32: true
    speed_fused_adamw: true

    val_eval_batch_size: 1024
    test_eval_batch_size: 6144
    eval_infer_chunk_bs: 144
    test_infer_chunk_bs: 144
    test_log_every: 50