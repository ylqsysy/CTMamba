baseline:
  svm:
    kernel: linear
    C: 0.8
    gamma: scale
    pca: 45
    max_train_per_class: 30
    class_weight: null

  cnn2d:
    patch_size: 15
    pca_bands: 9
    base_channels: 14
    dropout: 0.78
    augment: true
    batch_size: 64
    eval_batch_size: 512
    num_workers: 0

    lr: 0.00080
    weight_decay: 0.033
    grad_clip: 1.0

    max_epochs: 165
    early_stop_patience: 14
    min_epochs: 55
    select_metric: kappa

    use_amp: true
    label_smoothing: 0.12
    spectral_dropout: 0.28
    input_noise_std: 0.017

    class_weight: balanced
    class_weight_power: 0.70

  cnn3d:
    patch_size: 15
    pca_bands: 6
    dropout: 0.70
    augment: false
    batch_size: 32
    eval_batch_size: 256
    num_workers: 0
    lr: 0.00065
    weight_decay: 0.040
    grad_clip: 1.0
    max_epochs: 75
    early_stop_patience: 10
    min_epochs: 12
    select_metric: kappa
    use_amp: true
    label_smoothing: 0.14
    spectral_dropout: 0.35
    input_noise_std: 0.05

  spectralformer:
    patch_size: 15
    near_band: 11
    mode: CAF

    dim: 112
    depth: 6
    heads: 4
    dim_head: 28
    mlp_dim: 224
    dropout: 0.12
    emb_dropout: 0.06

    batch_size: 16
    eval_batch_size: 256
    num_workers: 0

    lr: 1.0e-4
    weight_decay: 2.0e-3
    betas: [0.9, 0.999]
    label_smoothing: 0.0
    grad_clip: 1.0

    max_epochs: 380
    early_stop: true
    early_stop_patience: 30
    min_epochs: 150
    select_metric: kappa

    scheduler: cosine
    min_lr: 1.0e-6

    pad_mode: reflect
    norm_mean_global_blend: 0.0
    norm_std_global_ratio: 0.05
    norm_std_abs_floor: 1.0e-3

    use_amp: true

  ssftt:
    patch_size: 15
    spectral_method: pca
    pca_bands: 30

    batch_size: 16
    eval_batch_size: 256
    num_workers: 0

    lr: 0.00020
    weight_decay: 0.11
    max_epochs: 120
    min_epochs: 24
    early_stop_patience: 14
    select_metric: kappa

    num_tokens: 1
    dim: 32
    depth: 1
    heads: 4
    mlp_dim: 64
    dropout: 0.66
    emb_dropout: 0.60

  3dss_mamba:
    patch_size: 15
    spectral_method: pca
    pca_bands: 24
    pca_whiten: false

    embed_dim: 40
    depth: 2
    d_state: 20
    dt_rank: 4
    dim_inner: 80
    group_type: "Cube"
    scan_type: "Parallel spectral-spatial"
    k_group: 4
    pos: true
    cls: true
    conv3D_channel: 40
    conv3D_kernel: [3, 5, 5]

    augment: true
    batch_size: 16
    lr: 1.5e-4
    weight_decay: 5.0e-3
    betas: [0.9, 0.999]
    grad_clip: 1.0
    label_smoothing: 0.04

    max_epochs: 160
    min_epochs: 45
    early_stop_patience: 16
    select_metric: kappa
    min_lr: 1.0e-6
    log_every: 10

    num_workers: 8
    prefetch_factor: 2
    persistent_workers: true
    eval_num_workers: 4
    test_num_workers: 4
    persistent_eval_workers: true
    val_prefetch_factor: 2
    test_prefetch_factor: 2

    speed_cudnn_benchmark: true
    speed_tf32: true
    speed_fused_adamw: true

    val_eval_batch_size: 1024
    test_eval_batch_size: 1024
    eval_infer_chunk_bs: 1024
    test_infer_chunk_bs: 1024
    test_log_every: 50