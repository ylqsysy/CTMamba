baseline:
  svm:
    kernel: linear
    C: 0.8
    gamma: scale
    pca: 45
    max_train_per_class: 30
    class_weight: null

  cnn2d:
    patch_size: 15
    pca_bands: 9
    base_channels: 14
    dropout: 0.78
    augment: true
    batch_size: 64
    eval_batch_size: 512
    num_workers: 0

    lr: 0.00080
    weight_decay: 0.033
    grad_clip: 1.0

    max_epochs: 165
    early_stop_patience: 14
    min_epochs: 55
    select_metric: kappa

    use_amp: true
    label_smoothing: 0.12
    spectral_dropout: 0.28
    input_noise_std: 0.017

    class_weight: balanced
    class_weight_power: 0.70

  cnn3d:
    patch_size: 15
    pca_bands: 6
    dropout: 0.70
    augment: false
    batch_size: 32
    eval_batch_size: 256
    num_workers: 0
    lr: 0.00065
    weight_decay: 0.040
    grad_clip: 1.0
    max_epochs: 75
    early_stop_patience: 10
    min_epochs: 12
    select_metric: kappa
    use_amp: true
    label_smoothing: 0.14
    spectral_dropout: 0.35
    input_noise_std: 0.05

  spectralformer:
