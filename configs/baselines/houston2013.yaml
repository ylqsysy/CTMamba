baseline:
  svm:
    kernel: linear
    C: 0.05
    gamma: scale
    pca: 4
    max_train_per_class: 30
    class_weight: null

  cnn2d:
    patch_size: 15
    pca_bands: 8
    base_channels: 12
    dropout: 0.80
    augment: true
    batch_size: 64
    eval_batch_size: 512
    num_workers: 0

    lr: 0.00082
    weight_decay: 0.032
    grad_clip: 1.0

    max_epochs: 170
    early_stop_patience: 15
    min_epochs: 55
    select_metric: kappa

    use_amp: true
    label_smoothing: 0.14
    spectral_dropout: 0.30
    input_noise_std: 0.018

    class_weight: null
    class_weight_power: 0.0

  cnn3d:
    patch_size: 15
    pca_bands: 5
    dropout: 0.76
    augment: false
    batch_size: 32
    eval_batch_size: 256
    num_workers: 0
    lr: 0.00070
    weight_decay: 0.048
    grad_clip: 1.0
    max_epochs: 75
    early_stop_patience: 12
    min_epochs: 12
    select_metric: kappa
    use_amp: true
    label_smoothing: 0.14
    spectral_dropout: 0.44
    input_noise_std: 0.048

  spectralformer:
    patch_size: 15
    near_band: 7
    mode: CAF

    dim: 64
    depth: 4
    heads: 4
    dim_head: 16
    mlp_dim: 128
    dropout: 0.20
    emb_dropout: 0.10

    batch_size: 16
    eval_batch_size: 256
    num_workers: 0

    lr: 3.0e-4
    weight_decay: 3.0e-3
    betas: [0.9, 0.999]
    label_smoothing: 0.06
    grad_clip: 1.0

    max_epochs: 160
    early_stop: true
    early_stop_patience: 30
    min_epochs: 50
    select_metric: kappa

    scheduler: cosine
    min_lr: 1.0e-6

    pad_mode: reflect
    norm_mean_global_blend: 0.0
    norm_std_global_ratio: 0.05
    norm_std_abs_floor: 1.0e-3

    use_amp: true

  ssftt:
    patch_size: 15
    spectral_method: pca
    pca_bands: 30

    batch_size: 16
    eval_batch_size: 256
    num_workers: 0

    lr: 0.000185
    weight_decay: 0.135
    max_epochs: 170
    min_epochs: 32
    early_stop_patience: 18
    select_metric: kappa

    num_tokens: 1
    dim: 24
    depth: 1
    heads: 2
    mlp_dim: 48
    dropout: 0.72
    emb_dropout: 0.64

  a2s2k:
    patch_size: 15
    pca_bands: 15
    kernel_channels: 12
    reduction: 4
    dropout: 0.45
    augment: false
    batch_size: 32
    eval_batch_size: 256
    num_workers: 0
    lr: 0.00037
    weight_decay: 0.050
    betas: [0.9, 0.999]
    grad_clip: 1.0
    max_epochs: 76
    min_epochs: 15
    early_stop_patience: 10
    select_metric: kappa
    label_smoothing: 0.09
    spectral_dropout: 0.18
    input_noise_std: 0.030
    class_weight: null
    class_weight_power: 0.0
    use_amp: true

  3dss_mamba:
    patch_size: 15
    spectral_method: pca
    pca_bands: 24
    pca_whiten: false
    embed_dim: 64
    depth: 1
    d_state: 16
    dt_rank: 4
    dim_inner: 128
    group_type: Cube
    scan_type: Parallel spectral-spatial
    k_group: 4
    pos: true
    cls: true
    conv3D_channel: 64
    conv3D_kernel: [3, 3, 3]
    augment: false
    batch_size: 64
    val_eval_batch_size: 1024
    test_eval_batch_size: 1024
    num_workers: 0
    eval_num_workers: 0
    test_num_workers: 0
    prefetch_factor: 2
    persistent_eval_workers: false
    val_prefetch_factor: 2
    test_prefetch_factor: 2
    lr: 0.00045
    weight_decay: 0.006
    betas: [0.9, 0.999]
    grad_clip: 1.0
    label_smoothing: 0.05
    max_epochs: 170
    min_epochs: 55
    early_stop_patience: 30
    eval_every: 2
    eval_on_first: false
    select_metric: kappa
    min_lr: 1.0e-6
    log_every: 10
    steps_per_epoch: 0
    cache_train_patches: true
    fast_eval_vectorized: true
    fast_eval_chunk_bs: 1024
    prefer_full_batch_eval: false
    eval_infer_chunk_bs: 128
    test_infer_chunk_bs: 128
    test_log_every: 50
    speed_cudnn_benchmark: true
    speed_tf32: true
    speed_fused_adamw: true
    pin_memory_train: false
    pin_memory_eval: false
    speed_torch_compile: false
    torch_compile_mode: reduce-overhead
    use_amp: true
